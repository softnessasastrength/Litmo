# App Store Safe Mode walkthrough — NO fictional demo path.
# G12 fix: store binary has features.demoModeSurface=false; copy is calm Soft Signal.
# Requires: app_store build (EAS production/preview) with EXPO_PUBLIC_LITMO_BUILD_MODE=app_store.
# Soft Signal labels: "End session now" / practice "Practice ending a session".
#
# This flow exercises entry → passkey/sign-in surface → Soft Signal practice chrome
# without tapping demo. Age gate / passkey may require device secrets — optional taps.
appId: com.litmo.app
---
- launchApp:
    clearState: true
- tapOn:
    text: "Cancel"
    optional: true
# Welcome (App Store copy)
- extendedWaitUntil:
    visible: ".*Clear boundaries.*|.*Welcome to Litmo.*|.*Continue.*"
    timeout: 60000
- takeScreenshot: asc-01-welcome-store
- tapOn:
    text: ".*Continue.*"
    optional: true
# Entry — must NOT require fictional demo
- extendedWaitUntil:
    visible: ".*How to continue.*|.*Welcome to Litmo.*|.*passkey.*|.*Account.*"
    timeout: 30000
- takeScreenshot: asc-02-entry-store
# Explicitly avoid demo if it appears (should not in app_store)
- assertNotVisible:
    text: ".*Enter the fictional demo.*"
    optional: true
# Real account path (optional if already signed in)
- tapOn:
    text: ".*Account with passkey.*|.*Sign in.*|.*Create.*"
    optional: true
- takeScreenshot: asc-03-auth-or-home
# Soft Signal practice — calm store labels
- tapOn:
    text: ".*Soft Signal.*|.*Practice ending.*|.*End session.*"
    optional: true
- extendedWaitUntil:
    visible: ".*End session now.*|.*Practice ending.*|.*ALWAYS AVAILABLE.*|.*Soft Signal.*"
    timeout: 20000
    optional: true
- takeScreenshot: asc-04-soft-signal-store
# Containment / home residual
- tapOn:
    text: ".*Home.*|.*Containment.*"
    optional: true
- takeScreenshot: asc-05-home-store
# Privacy honesty surface
- tapOn:
    text: ".*Settings.*|.*Privacy.*|.*Delete.*"
    optional: true
- takeScreenshot: asc-06-privacy-store

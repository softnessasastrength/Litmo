    timeout: 15000
- takeScreenshot: 04-onboarding-start
- tapOn:
    text: ".*Continue.*|.*Next.*|.*Save.*"
    optional: true
- takeScreenshot: 05-onboarding-2
- tapOn:
    text: ".*Continue.*|.*Next.*|.*Save.*"
    optional: true
- takeScreenshot: 06-onboarding-3
- tapOn:

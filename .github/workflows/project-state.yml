name: Project State

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-project-state:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate resumable handoff state
        run: npm run state:check
